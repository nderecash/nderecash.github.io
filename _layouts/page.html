---
layout: default
---
<div class="container">
  <div class="page-hero">
    {% if page.eyebrow %}<span class="eyebrow">{{ page.eyebrow }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.lead %}<p class="lead">{{ page.lead }}</p>{% endif %}
  </div>
  <div class="post__body">
    {{ content }}
  </div>
</div>
