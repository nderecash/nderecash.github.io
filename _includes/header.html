<header class="site-header" role="banner">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Moses Nderemani — home">Moses Nderemani</a>
    <nav class="site-nav" aria-label="Main navigation">
      <button
        class="site-nav__toggle"
        aria-label="Toggle navigation menu"
        aria-expanded="false"
        aria-controls="nav-list">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <ul class="site-nav__list" id="nav-list" role="list">
        <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active" aria-current="page"{% endif %}>About</a></li>
        <li><a href="{{ '/work/' | relative_url }}" {% if page.url contains '/work' %}class="active" aria-current="page"{% endif %}>Work</a></li>
        <li><a href="{{ '/cv/' | relative_url }}" {% if page.url == '/cv/' %}class="active" aria-current="page"{% endif %}>CV</a></li>
        <li><a href="{{ '/connect/' | relative_url }}" {% if page.url contains '/connect' %}class="active" aria-current="page"{% endif %}>Connect</a></li>
      </ul>
    </nav>
  </div>
</header>
<script>
(function(){
  var btn = document.querySelector('.site-nav__toggle');
  var nav = document.querySelector('.site-nav');
  if(!btn) return;
  btn.addEventListener('click', function(){
    var open = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', String(!open));
    nav.classList.toggle('is-open', !open);
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && nav.classList.contains('is-open')){
      nav.classList.remove('is-open');
      btn.setAttribute('aria-expanded','false');
      btn.focus();
    }
  });
})();
</script>
